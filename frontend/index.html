<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .converter-card {
            max-width: 650px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            background: #ffffff;
        }
        .user-input {
            border: 1px solid #dadce0;
            border-radius: 4px;
            padding: 10px;
            font-size: 1.2rem;
            width: 100%;
        }
        .user-select {
            border: 1px solid #dadce0;
            border-top: none;
            border-radius: 0 0 4px 4px;
            padding: 6px;
            background-color: #f8f9fa;
            width: 100%;
            font-size: 0.9rem;
        }
        .equals-sign {
            font-size: 2rem;
            color: #70757a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="converter-card mx-auto p-4 shadow-sm">
        <h4 class="mb-4 text-secondary">Unit Converter</h4>
        
        <div class="mb-4">
            <label for="categorySelect" class="form-label text-muted fw-bold">Measurement Category</label>
            <select id="categorySelect" class="form-select form-select-lg">
                <option value="Length" selected>Length</option>
                <option value="Mass">Mass / Weight</option>
                <option value="Temperature">Temperature</option>
                <option value="Volume">Volume</option>
                <option value="Time">Time</option>
                <option value="Area">Area</option>
            </select>
        </div>

        <div class="row g-3 align-items-center">
            
            <div class="col-md-5">
                <input type="text" id="fromValue" class="user-input" value="1">
                <select id="fromUnit" class="user-select"></select>
            </div>

            <div class="col-md-2 text-center">
                <div class="equals-sign">=</div>
            </div>

            <div class="col-md-5">
                <input type="text" id="toValue" class="user-input" readonly placeholder="Result">
                <select id="toUnit" class="user-select"></select>
            </div>
            
        </div>

        <div id="errorMessage" class="text-danger mt-3 small" style="display: none;"></div>
    </div>
</div>

<script>
    const API_BASE_URL = "http://127.0.0.1:8080/convert";

    const parentCategories = [
        { name: "Length", label: "Length" },
        { name: "Area", label: "Area" },
        { name: "DataTransferRate", label: "Data Transfer Rate" },
        { name: "DigitalStorage", label: "Digital Storage" },
        { name: "Energy", label: "Energy" },
        { name: "Frequency", label: "Frequency" },
        { name: "FuelEconomy", label: "Fuel Economy" },
        { name: "Mass", label: "Mass / Weight" },
        { name: "PlaneAngle", label: "Plane Angle" },
        { name: "Pressure", label: "Pressure" },
        { name: "Speed", label: "Speed" },
        { name: "Temperature", label: "Temperature" },
        { name: "Volume", label: "Volume" }
    ];

    const unitManifest = {
        Length: [
            { name: "KILOMETER", label: "Kilometer (km)" },
            { name: "METER", label: "Meter (m)" },
            { name: "CENTIMETER", label: "Centimeter (cm)" },
            { name: "MILLIMETER", label: "Millimeter (mm)" },
            { name: "MICROMETER", label: "Micrometer (μm)" },
            { name: "NANOMETER", label: "Nanometer (nm)" },
            { name: "MILE", label: "Mile (mi)" },
            { name: "YARD", label: "Yard (yd)" },
            { name: "FOOT", label: "Foot (ft)" },
            { name: "INCH", label: "Inch (in)" },
            { name: "NAUTICALE_MILE", label: "Nautical Mile (nmi)" }
        ],
        Area: [
            { name: "SQUAREKILOMETER", label: "Square Kilometer (km²)" },
            { name: "SQUAREMETER", label: "Square Meter (m²)" },
            { name: "SQUAREMILE", label: "Square Mile (mi²)" },
            { name: "SQUAREYARD", label: "Square Yard (yd²)" },
            { name: "SQUAREFOOT", label: "Square Foot (ft²)" },
            { name: "SQUAREINCH", label: "Square Inch (in²)" },
            { name: "HECTARE", label: "Hectare (ha)" },
            { name: "ACRE", label: "Acre (ac)" }
        ],
        DataTransferRate: [
            { name: "BITPERSECOND", label: "Bit per second (bps)" },
            { name: "KILOBITPERSECOND", label: "Kilobit per second (kbps)" },
            { name: "KILOBYTEPERSECOND", label: "Kilobyte per second (kB/s)" },
            { name: "MEGABITPERSECOND", label: "Megabit per second (Mbps)" },
            { name: "MEGABYTEPERSECOND", label: "Megabyte per second (MB/s)" },
            { name: "GIGABITPERSECOND", label: "Gigabit per second (Gbps)" },
            { name: "GIGABYTEPERSECOND", label: "Gigabyte per second (GB/s)" },
            { name: "TERABITPERSECOND", label: "Terabit per second (Tbps)" },
            { name: "TERABYTEPERSECOND", label: "Terabyte per second (TB/s)" }
        ],
        DigitalStorage: [
            { name: "BIT", label: "Bit (b)" },
            { name: "KILOBIT", label: "Kilobit (kb)" },
            { name: "MEGABIT", label: "Megabit (Mb)" },
            { name: "GIGABIT", label: "Gigabit (Gb)" },
            { name: "TERABIT", label: "Terabit (Tb)" },
            { name: "PETABIT", label: "Petabit (Pb)" },
            { name: "BYTE", label: "Byte (B)" },
            { name: "KILOBYTE", label: "Kilobyte (KB)" },
            { name: "MEGABYTE", label: "Megabyte (MB)" },
            { name: "GIGABYTE", label: "Gigabyte (GB)" },
            { name: "TERABYTE", label: "Terabyte (TB)" },
            { name: "PETABYTE", label: "Petabyte (PB)" }
        ],
        Energy: [
            { name: "JOULE", label: "Joule (J)" },
            { name: "kILOJOULE", label: "Kilojoule (kJ)" },
            { name: "GRAMCALORIE", label: "Gram Calorie (cal)" },
            { name: "KILOCALORIE", label: "Kilocalorie (kcal)" },
            { name: "WATTHOUR", label: "Watt-hour (Wh)" },
            { name: "KILOWATTHOUR", label: "Kilowatt-hour (kWh)" },
            { name: "ELECTRO_NVOLT", label: "Electronvolt (eV)" },
            { name: "BRITISH_THERMAL_UNIT", label: "British Thermal Unit (BTU)" },
            { name: "US_THERM", label: "US Therm (thm)" },
            { name: "FOOT_POUND", label: "Foot-pound (ft⋅lbf)" }
        ],
        Frequency: [
            { name: "HERTZ", label: "Hertz (Hz)" },
            { name: "KILOHERTZ", label: "Kilohertz (kHz)" },
            { name: "MEGAHERTZ", label: "Megahertz (MHz)" },
            { name: "GIGAHERTZ", label: "Gigahertz (GHz)" }
        ],
        FuelEconomy: [
            { name: "MILES_PER_GALLON", label: "Miles per Gallon (mpg)" },
            { name: "MILES_PER_GALLON_IMPERIAL", label: "Miles per Gallon Imperial (mpg imp)" },
            { name: "KILOMETER_PER_LITER", label: "Kilometer per Liter (km/L)" },
            { name: "LITER_PER_HUNDRED_KILOMETER", label: "Liters per 100 Kilometers (L/100km)" }
        ],
        Mass: [
            { name: "METRIC_TON", label: "Metric Ton (t)" },
            { name: "KILOGRAM", label: "Kilogram (kg)" },
            { name: "GRAM", label: "Gram (g)" },
            { name: "MILLIGRAM", label: "Milligram (mg)" },
            { name: "MICROGRAM", label: "Microgram (μg)" },
            { name: "IMPERIAL_TON", label: "Imperial Ton (long ton)" },
            { name: "US_TON", label: "US Ton (short ton)" },
            { name: "STONE", label: "Stone (st)" },
            { name: "POUND", label: "Pound (lb)" },
            { name: "OUNCE", label: "Ounce (oz)" }
        ],
        PlaneAngle: [
            { name: "ARCSECOND", label: "Arcsecond (\")" },
            { name: "DEGREE", label: "Degree (°)" },
            { name: "GRADIAN", label: "Gradian (gon)" },
            { name: "MILLIRADIAN", label: "Milliradian (mrad)" },
            { name: "MINUTE_OF_ARC", label: "Minute of Arc (')" },
            { name: "RADIAN", label: "Radian (rad)" }
        ],
        Pressure: [
            { name: "BAR", label: "Bar (bar)" },
            { name: "PASCAL", label: "Pascal (Pa)" },
            { name: "POUND_FORCE_PER_SQUARE_INCH", label: "Pound-force per Square Inch (psi)" },
            { name: "STANDARD_ATMOSPHERE", label: "Standard Atmosphere (atm)" },
            { name: "TORR", label: "Torr (Torr)" }
        ],
        Speed: [
            { name: "MILE_PER_HOUR", label: "Mile per Hour (mph)" },
            { name: "FOOT_PER_HOUR", label: "Foot per Second (fps)" },
            { name: "METER_PER_SECOND", label: "Meter per Second (m/s)" },
            { name: "KILOMETER_PER_HOUR", label: "Kilometer per Hour (km/h)" },
            { name: "KNOT", label: "Knot (kn)" }
        ],
        Temperature: [
            { name: "DEGREE_CELSIUS", label: "Celsius (°C)" },
            { name: "FAHRENHEIT", label: "Fahrenheit (°F)" },
            { name: "KELVIN", label: "Kelvin (K)" }
        ],
        Volume: [
            { name: "US_LIQUID_GALLON", label: "US Gallon (gal)" },
            { name: "US_LIQUID_QUART", label: "US Quart (qt)" },
            { name: "US_LIQUID_PINT", label: "US Pint (pt)" },
            { name: "US_LEGAL_CUP", label: "US Cup (c)" },
            { name: "US_FLUID_OUNCE", label: "US Fluid Ounce (fl oz)" },
            { name: "US_TABLESPOON", label: "US Tablespoon (tbsp)" },
            { name: "US_TEASPOON", label: "US Teaspoon (tsp)" },
            { name: "CUBIC_METER", label: "Cubic Meter (m³)" },
            { name: "LITER", label: "Liter (L)" },
            { name: "MILLILITER", label: "Milliliter (mL)" },
            { name: "IMPERIAL_GALLON", label: "Imperial Gallon (imp gal)" },
            { name: "IMPERIAL_QUART", label: "Imperial Quart (imp qt)" },
            { name: "IMPERIAL_PINT", label: "Imperial Pint (imp pt)" },
            { name: "IMERIAL_CUP", label: "Imperial Cup (metric cup)" },
            { name: "IMPERIAL_FLUID_OUNCE", label: "Imperial Fluid Ounce (imp fl oz)" },
            { name: "IMPERIAL_TABLESPOON", label: "Imperial Tablespoon (imp tbsp)" },
            { name: "IMPERIAL_TEASPOON", label: "Imperial Teaspoon (imp tsp)" },
            { name: "CUBIC_FOOT", label: "Cubic Foot (ft³)" },
            { name: "CUBIC_INCH", label: "Cubic Inch (in³)" }
        ]
    };

    // Keep track of the active selections in the global scope
    let lastFromUnit = "";
    let lastToUnit = "";

    const categorySelect = document.getElementById("categorySelect");
    const fromUnitSelect = document.getElementById("fromUnit");
    const toUnitSelect = document.getElementById("toUnit");
    const fromValueInput = document.getElementById("fromValue");
    const toValueInput = document.getElementById("toValue");
    const errorMessage = document.getElementById("errorMessage");

    function populateUnits() {
        const activeCategory = categorySelect.value;
        const availableUnits = unitManifest[activeCategory];

        fromUnitSelect.innerHTML = "";
        toUnitSelect.innerHTML = "";

        availableUnits.forEach((unit, index) => {
            const optFrom = new Option(unit.label, unit.name);
            const optTo = new Option(unit.label, unit.name);
            
            fromUnitSelect.add(optFrom);
            toUnitSelect.add(optTo);
        });

        if (toUnitSelect.options.length > 1) {
            toUnitSelect.selectedIndex = 1;
        }

        // Initialize tracking states
        lastFromUnit = fromUnitSelect.value;
        lastToUnit = toUnitSelect.value;

        sendConversionRequest();
    }

    async function sendConversionRequest() {
        errorMessage.style.display = "none";
        const val = fromValueInput.value.trim();

        if (!/^-?\d+(\.\d+)?$/.test(val)) {
            toValueInput.value = "";
            return; 
        }

        const queryParams = new URLSearchParams({
            value: val,
            base_unit: categorySelect.value,
            from_unit: fromUnitSelect.value,
            to_unit: toUnitSelect.value
        });

        try {
            const response = await fetch(`${API_BASE_URL}?${queryParams.toString()}`);
            const data = await response.json();

            if (response.ok) {
                toValueInput.value = data.converted_value;
            } else {
                showError(data.Message || "Backend execution validation failure.");
            }
        } catch (err) {
            showError("Cannot reach local Flask backend server instance. Verify it is running on port 8080.");
        }
    }

    function showError(msg) {
        errorMessage.textContent = msg;
        errorMessage.style.display = "block";
        toValueInput.value = "";
    }

    function handleUnitChange(event) {
        if (fromUnitSelect.value === toUnitSelect.value) {
            if (event.target === fromUnitSelect) {
                toUnitSelect.value = lastFromUnit;
            } else if (event.target === toUnitSelect) {
                fromUnitSelect.value = lastToUnit;
            }
        }

        // Update tracking variables for the next interaction
        lastFromUnit = fromUnitSelect.value;
        lastToUnit = toUnitSelect.value;

        sendConversionRequest();
    }
    function populateParentCategories() {
        const categorySelect = document.getElementById("categorySelect");
        
        categorySelect.innerHTML = "";

        parentCategories.forEach(category => {
            const opt = new Option(category.label, category.name);
            categorySelect.add(opt);
        });
    }

    categorySelect.addEventListener("change", populateUnits);
    fromUnitSelect.addEventListener("change", handleUnitChange);
    toUnitSelect.addEventListener("change", handleUnitChange);
    fromValueInput.addEventListener("input", sendConversionRequest);

    populateParentCategories()
    populateUnits();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
